services:
  geoserver:
    build:
      context: .
      dockerfile: Dockerfile
    image: geoserver-oracle:2.28.2
    container_name: geoserver
    restart: unless-stopped
    ports:
      - "${GEOSERVER_PORT:-8080}:8080"
    environment:
      # JVM Optimizasyonları
      INITIAL_MEMORY: "${INITIAL_MEMORY:-4G}"
      MAXIMUM_MEMORY: "${MAXIMUM_MEMORY:-8G}"

      # GeoServer Performans Ayarları
      GEOSERVER_ADMIN_PASSWORD: "${GEOSERVER_ADMIN_PASSWORD:-geoserver}"
      GEOSERVER_ADMIN_USER: "${GEOSERVER_ADMIN_USER:-admin}"

      # Cache Optimizasyonları
      GEOWEBCACHE_CACHE_DIR: "/opt/geoserver/data_dir/gwc"
      TILE_CACHE_DIR: "${TILE_CACHE_DIR:-/opt/geoserver/data_dir/gwc}"

      # GeoTIFF Optimizasyonları
      ENABLE_JSONP: "true"
      MAX_FILTER_RULES: "20"
      OPTIMIZE_LINE_WIDTH: "false"

      # JAI (Java Advanced Imaging) Ayarları
      USE_JAI_IMAGEREAD: "true"
      JAI_MEMORY_CAPACITY: "0.75"
      JAI_MEMORY_THRESHOLD: "0.75"
      JAI_TILE_THREADS: "7"
      JAI_TILE_PRIORITY: "5"
      JAI_RECYCLING: "true"
      JAI_NATIVE_WARP: "false"
      JAI_MOSAICING: "false"

      # Coverage Access (TIFF için önemli)
      IMAGEIO_CACHE_MEMORY_THRESHOLD: "0.75"

      # CORS Ayarları
      GEOSERVER_CSRF_DISABLED: "true"

      # Eklentiler için ortam değişkenleri
      STABLE_EXTENSIONS: "${STABLE_EXTENSIONS:-vectortiles-plugin,charts-plugin,css-plugin,mbstyle-plugin,wps-plugin,importer-plugin,gdal-plugin}"

      # Oracle için (gerekirse)
      COMMUNITY_EXTENSIONS: "${COMMUNITY_EXTENSIONS:-oracle-plugin}"

      # GDAL Data Path
      GDAL_CACHEMAX: "${GDAL_CACHEMAX:-512}"
      GDAL_DATA: "${GDAL_DATA:-/usr/share/gdal}"

      # Timezone
      TZ: "${TZ:-Europe/Istanbul}"

    volumes:
      # Data dizini - Host üzerinden erişilebilir
      - ./geoserver_data:/opt/geoserver/data_dir

      # GeoWebCache dizini
      - ./gwc_cache:/opt/geoserver/data_dir/gwc

      # Ek eklentiler için
      - ./geoserver_extensions:/opt/geoserver/webapps/geoserver/WEB-INF/lib/extensions

      # Loglama
      - ./logs:/opt/geoserver/data_dir/logs

      # GDAL veri dosyaları
      - ./gdal_data:/usr/share/gdal

    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:8080/geoserver/web/ || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

    networks:
      - geoserver-network

  # PostgreSQL/PostGIS (Opsiyonel ama önerilen)
  postgis:
    image: postgis/postgis:16-3.5
    container_name: postgis
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-geoserver}
      POSTGRES_USER: ${POSTGRES_USER:-geoserver}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-geoserver}
      POSTGRES_MULTIPLE_EXTENSIONS: postgis,hstore,postgis_topology,postgis_raster
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
    networks:
      - geoserver-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U geoserver" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # Nginx Reverse Proxy (Opsiyonel - Production için önerilen)
  nginx:
    image: nginx:alpine
    container_name: geoserver-nginx
    restart: unless-stopped
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
      - "${NGINX_HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - geoserver
    networks:
      - geoserver-network

networks:
  geoserver-network:
    driver: bridge

volumes:
  geoserver_data:
  postgres_data:
  gwc_cache:
